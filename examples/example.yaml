theory:
  # Extra arguments for CLASS theory code
  classy:
    extra_args:
      N_ncdm: 1
      N_ur: 2.046
      Omega_Lambda: 0.
      Omega_fld: 0.
      # Scalar field theory parameters
      Omega_smg: -1
      M_pl_today_smg: -1.
      gravity_model: "quintom"
      gravity_submodel: "quintom_shift_alpha"
      tuning_dxdy_guess_smg: 1.
      tuning_index_smg: 8
      # Stability tests
      skip_stability_tests_smg: "no"
      a_min_stability_test_smg: 1e-2
      skip_math_stability_smg: "yes"
      method_qs_smg: "fully_dynamic"
      # Perturbation calculations
      pert_initial_conditions_smg: "gravitating_attr"
      # Fixed model parameters
      use_pert_var_deltaphi_smg: "yes"
      start_small_k_at_tau_c_over_tau_h: 1e-6
      start_large_k_at_tau_h_over_tau_k: 1e-6
      perturbations_sampling_stepsize: 0.03
      nonlinear_min_k_max: 25
      l_logstep: 1.045 #1.026 #(high precision) #1.045 #(standard precision)
      l_linstep: 25
      k_per_decade_for_pk: 30 #200 #(high precision) #30 #(standard precision)
      # For debugging
      background_verbose: 0
      perturbations_verbose: 0
      sBBN file: sBBN_2017.dat
      non linear: hmcode
      hmcode_version: 2020

likelihood:
  planck_2018_lowl.TT_clik:
  planck_2018_lowl.EE_clik:
  bao.desi_dr2:
  sn.desy5:

params:
  # ==============================
  # === Dark energy parameters ===
  # ==============================
  # --- Sampled ---
  V0_smg:
    prior:
      min: 1.
      max: 20.
    latex: V_0
    ref:
      dist: norm
      loc: 6.5
      scale: 1.5
  m2_smg:
    prior:
      min: -50.0
      max: 0.
    latex: m^2
    ref:
      dist: norm
      loc: -34.0
      scale: 9
  lambda_smg:
    prior:
      min: 0.001
      max: 40.
    latex: lambda
    ref:
      dist: norm
      loc: 20.
      scale: 15.
  xi_smg:
    prior:
      min: -50.0
      max: 0.0
    latex: \xi
    ref:
      dist: norm
      loc: -42.
      scale: 19
  # --- Fixed ---
  alpha_smg:
    latex: \alpha
  phi_star_smg:
    latex: \phi_s
  # beta_smg:
  #   value: 0
  #   latex: \beta
  # mu_smg:
  #   value: 0
  #   latex: \nu
  # phi_s_smg:
  #   value: 0
  #   latex: \phi_s
  phi0_smg:
    value: 0
    latex: \phi
  dphi0_smg:
    value: 1e-3
    latex: \phi'

  # ===============================
  # === Cosmological parameters ===
  # ===============================

  # --- Sampled ---
  logA:
    prior: # By default uniform
      min: 2.
      max: 4.
    ref: # Parameter initialization
      dist: norm
      loc: 3.06
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  n_s: # By default uniform
    prior:
      min: 0.8
      max: 1.1
    ref:
      dist: norm
      loc: 0.971
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
  H0:
    prior:
      min: 40.
      max: 90.
    ref:
      dist: norm
      loc: 67.9
      scale: 1
    latex: H_0
  tau_reio:
    prior:
      min: 0.01
      max: 0.2
    ref:
      dist: norm
      loc: 0.045
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  omega_b:
    prior:
      min: 0.005
      max: 0.04
    ref:
      dist: norm
      loc: 0.02238
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2

  # --- Fixed parameters ---
  m_ncdm: # Neutrino mass
    value: 0.06
    renames: mnu
  # --- Labels and derivations ---
  A_s:
    value: "lambda logA: 1e-10*np.exp(logA)"
    latex: A_\mathrm{s}
  omegam:
    latex: \Omega_\mathrm{m}
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  YHe:
    latex: Y_\mathrm{P}
  z_reio:
    latex: z_\mathrm{re}
  A:
    derived: "lambda A_s: 1e9*A_s"
    latex: 10^9 A_\mathrm{s}
  clamp:
    derived: "lambda A_s, tau_reio: 1e9*A_s*np.exp(-2*tau_reio)"
    latex: 10^9 A_\mathrm{s} e^{-2\tau}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
  rs_drag:
    latex: r_\mathrm{drag}

sampler:
  polychord:
    path: /home/marvas/LambdaMCMC/external/code/PolyChordLite
    nlive: 25d
    nprior: 10nlive
    synchronous: False
    measure_speeds: True
    oversample_power: 0.0
    boost_posterior: 0
    precision_criterion: 0.01
    feedback: 1
    maximise: True
resume: True
output: resume/quintom
